[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "simpli-core"
version = "0.1.0"
description = "Shared SDK with common models, auth helpers, and integration utilities for the Simpli Support product family"
requires-python = ">=3.11"
dependencies = [
    "pydantic[email]>=2.10",
    "python-dotenv>=1.0",
    "pyyaml>=6.0",
    "typer>=0.15",
]

[project.optional-dependencies]
redis = ["redis>=5.2"]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=6.0",
    "ruff>=0.8",
    "mypy>=1.13",
    "types-pyyaml>=6.0",
    "types-redis>=4.6",
]

[project.scripts]
simpli-core = "simpli_core.cli:app"

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "SIM"]

[tool.mypy]
strict = true
python_version = "3.11"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
